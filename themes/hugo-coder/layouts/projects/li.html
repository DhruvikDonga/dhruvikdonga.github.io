<li>
  <small><span class="date">{{ .Date | time.Format (.Site.Params.dateFormat | default "January 2, 2006" ) }}</span></small>
  <div>
    <a class="title" href="{{ .Params.externalLink | default .RelPermalink }}">{{ .Title }}</a>
    <br>
    <p class="description">
      <small>
        {{ with .Params.description }}
          {{ . }}...
        {{ else }}
          {{ .Summary }}
        {{ end }}
        <a class="read-more" href="{{ .Params.externalLink | default .RelPermalink }}">
          Read more →
        </a>
      </small>
  </p>
  </div>
</li>
